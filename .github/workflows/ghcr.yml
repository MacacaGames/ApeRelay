name: Build and Publish to GHCR

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set GHCR package visibility to public
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          REPOSITORY: ${{ github.repository }}
          GHCR_ADMIN_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          PACKAGE_NAME="$(echo "${REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          TOKEN="${GHCR_ADMIN_TOKEN:-$GITHUB_TOKEN_FALLBACK}"

          if [ -z "$TOKEN" ]; then
            echo "No token available to set GHCR visibility."
            exit 1
          fi

          if [ "$OWNER_TYPE" = "Organization" ]; then
            API_URL="https://api.github.com/orgs/$OWNER/packages/container/$PACKAGE_NAME/visibility"
          else
            API_URL="https://api.github.com/users/$OWNER/packages/container/$PACKAGE_NAME/visibility"
          fi

          HTTP_CODE=$(curl -sS -o /tmp/ghcr_visibility_response.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" \
            -d '{"visibility":"public"}')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "GHCR package visibility is now public."
            exit 0
          fi

          echo "Failed to set GHCR visibility via API. HTTP $HTTP_CODE"
          cat /tmp/ghcr_visibility_response.json
          exit 1

      - name: Visibility fallback hint
        if: github.event_name != 'pull_request' && failure()
        run: |
          echo "If the previous step failed, add a repository secret named GHCR_ADMIN_TOKEN (classic PAT) and rerun workflow."
          echo "Then set package visibility once in GitHub Packages UI as fallback."